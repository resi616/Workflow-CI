name: Machine Learning CI Re-training Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow matplotlib seaborn

      - name: Run MLflow Project Re-training
        run: |
          mlflow run MLProject --env-manager local -P n_estimators=100 -P max_depth=10


      - name: Commit and push model artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git add -f mlruns mlflow.db || echo "No local artifacts to force add"
          git commit -m "Auto-update model artifacts from CI run [skip ci]" || echo "No changes to commit"
          git push origin main
